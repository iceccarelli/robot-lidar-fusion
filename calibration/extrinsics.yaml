# Static transforms between robot frames and sensors
transforms:
  # LiDAR mounted on torso/head height, slight downward tilt
  - parent_frame: base_link
    child_frame: os_sensor
    translation: [0.0, 0.0, 1.20]
    rotation: [0.0, 0.0, 0.0, 1.0]

  # Camera aligned with LiDAR with slight vertical offset
  - parent_frame: base_link
    child_frame: camera_link
    translation: [0.0, 0.0, 1.25]
    rotation: [0.0, 0.0, 0.0, 1.0]

# Adjust the translation (x, y, z in metres) and rotation
# (quaternion [x, y, z, w]) based on actual sensor mounts.  Use a
# calibration process to determine the extrinsic relationship
# precisely.  The yaw, pitch and roll of the camera and LiDAR should
# align so that their fields of view overlap as much as possible.